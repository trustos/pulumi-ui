name: nomad-cluster
runtime: yaml
description: "Full Nomad + Consul cluster on OCI VM.Standard.A1.Flex (Always Free eligible) — individual instances behind a public NLB with HTTP ingress"

meta:
  agentAccess: true
  groups:
    - key: infrastructure
      label: "Infrastructure"
      fields: [nodeCount, compartmentName, compartmentDescription, vcnCidr, publicSubnetCidr, privateSubnetCidr, shape, imageId]
    - key: compute
      label: "Compute & Storage"
      fields: [ocpusPerNode, memoryGbPerNode, bootVolSizeGb, sshPublicKey]
    - key: software
      label: "Software Versions"
      fields: [nomadVersion, consulVersion]
  fields:
    imageId:
      ui_type: oci-image
    shape:
      ui_type: oci-shape
    sshPublicKey:
      ui_type: ssh-public-key
  applications:
    - key: traefik
      name: Traefik Reverse Proxy
      description: "HTTP/HTTPS ingress with automatic Let's Encrypt certificates and Consul/Nomad service discovery"
      tier: workload
      target: first
      port: 80
      required: false
      defaultOn: true
      consulEnv:
        NOMAD_TOKEN: "nomad/bootstrap-token"
      configFields:
        - key: acmeEmail
          label: ACME Email
          type: text
          required: true
          description: "Email for Let's Encrypt certificate notifications"
    - key: postgres
      name: PostgreSQL + pgAdmin
      description: "PostgreSQL 16 database with pgAdmin web UI. Credentials auto-generated and stored in Consul KV."
      tier: workload
      target: first
      port: 5432
      required: false
      defaultOn: false
      dependsOn: [traefik]
      consulEnv:
        NOMAD_TOKEN: "nomad/bootstrap-token"
      configFields:
        - key: dbUser
          label: Database User
          type: text
          required: false
          default: "admin"
          description: "PostgreSQL admin username (password auto-generated)"
        - key: pgadminEmail
          label: pgAdmin Email
          type: text
          required: true
          description: "Login email for pgAdmin web UI"
        - key: pgadminDomain
          label: pgAdmin Domain
          type: text
          required: false
          default: "pgadmin.example.com"
          description: "Domain for pgAdmin (requires DNS + Traefik)"
    - key: postgres-backup
      name: PostgreSQL Backup
      description: "Scheduled pg_dump with upload to OCI Object Storage. Runs as a periodic Nomad batch job."
      tier: workload
      target: first
      required: false
      defaultOn: false
      dependsOn: [postgres]
      consulEnv:
        NOMAD_TOKEN: "nomad/bootstrap-token"
      configFields:
        - key: backupSchedule
          label: Schedule (cron)
          type: text
          required: false
          default: "0 4 * * *"
          description: "Cron expression for backup schedule (default: daily at 4am UTC)"
        - key: bucketName
          label: OCI Bucket
          type: text
          required: false
          default: "postgres-backups"
          description: "OCI Object Storage bucket name (auto-created if missing)"
        - key: retentionCount
          label: Retention Count
          type: text
          required: false
          default: "7"
          description: "Number of backups to keep per database"
    - key: nocobase
      name: NocoBase
      description: "Open-source no-code/low-code platform for building business applications. Connects to PostgreSQL."
      tier: workload
      target: first
      port: 13000
      required: false
      defaultOn: false
      dependsOn: [postgres]
      consulEnv:
        NOMAD_TOKEN: "nomad/bootstrap-token"
      configFields:
        - key: domain
          label: Domain
          type: text
          required: true
          description: "Public domain for NocoBase (requires DNS + Traefik)"
        - key: appKey
          label: App Secret Key
          type: text
          required: true
          description: "Secret key for session encryption (random string, e.g. openssl rand -hex 32)"
        - key: dbUser
          label: Database User
          type: text
          required: false
          default: "admin"
          description: "PostgreSQL user"
        - key: dbPassword
          label: Database Password
          type: text
          required: true
          description: "PostgreSQL password"
        - key: dbName
          label: Database Name
          type: text
          required: false
          default: "nocobase"
          description: "PostgreSQL database name for NocoBase"
    - key: github-runner
      name: GitHub Actions Runner
      description: "Self-hosted GitHub Actions runner for CI/CD deployment to this cluster"
      tier: workload
      target: first
      required: false
      defaultOn: false
      consulEnv:
        NOMAD_TOKEN: "nomad/bootstrap-token"
      configFields:
        - key: githubToken
          label: GitHub Token
          type: text
          required: true
          description: "Personal access token with repo/org runner registration scope"
        - key: githubRepo
          label: Repository URL
          type: text
          required: true
          description: "e.g. https://github.com/org/repo (or org URL for org-level runner)"
        - key: runnerLabels
          label: Runner Labels
          type: text
          required: false
          default: "self-hosted,nomad"
          description: "Comma-separated labels for workflow targeting (runs-on)"

config:
  nodeCount:
    type: integer
    default: 3
  compartmentName:
    type: string
    default: "nomad-compartment"
  compartmentDescription:
    type: string
    default: "Compartment for Nomad cluster"
  vcnCidr:
    type: string
    default: "10.0.0.0/16"
  publicSubnetCidr:
    type: string
    default: "10.0.1.0/24"
  privateSubnetCidr:
    type: string
    default: "10.0.2.0/24"
  shape:
    type: string
    default: "VM.Standard.A1.Flex"
  imageId:
    type: string
  ocpusPerNode:
    type: integer
    default: 1
  memoryGbPerNode:
    type: integer
    default: 6
  bootVolSizeGb:
    type: integer
    default: 50
  nomadVersion:
    type: string
    default: "1.11.3"
  consulVersion:
    type: string
    default: "1.22.6"
  sshPublicKey:
    type: string

variables:
  availabilityDomains:
    fn::invoke:
      function: oci:Identity/getAvailabilityDomains:getAvailabilityDomains
      arguments:
        compartmentId: ${oci:tenancyOcid}
      return: availabilityDomains

resources:
# --- section: identity ---
  nomad-compartment:
    type: oci:Identity/compartment:Compartment
    properties:
      compartmentId: ${oci:tenancyOcid}
      name: {{ .Config.compartmentName }}
      description: {{ .Config.compartmentDescription | quote }}
      enableDelete: false

# --- section: iam ---
  nomad-cluster-dg:
    type: oci:Identity/dynamicGroup:DynamicGroup
    properties:
      compartmentId: ${oci:tenancyOcid}
      name: nomad-cluster-dg
      description: "Dynamic group for Nomad cluster instances"
      matchingRule: "ALL {instance.compartment.id = '${nomad-compartment.id}'}"
  nomad-cluster-policy:
    type: oci:Identity/policy:Policy
    properties:
      compartmentId: ${nomad-compartment.id}
      name: nomad-cluster-policy
      description: "Allow Nomad cluster nodes to manage cluster resources"
      statements: ["Allow dynamic-group nomad-cluster-dg to read virtual-network-family in compartment id ${nomad-compartment.id}", "Allow dynamic-group nomad-cluster-dg to read instance-family in compartment id ${nomad-compartment.id}", "Allow dynamic-group nomad-cluster-dg to read compute-management-family in compartment id ${nomad-compartment.id}", "Allow dynamic-group nomad-cluster-dg to read load-balancers in compartment id ${nomad-compartment.id}", "Allow dynamic-group nomad-cluster-dg to manage buckets in compartment id ${nomad-compartment.id}", "Allow dynamic-group nomad-cluster-dg to manage objects in compartment id ${nomad-compartment.id}"]
    options:
      dependsOn:
        - ${nomad-cluster-dg}

# --- section: networking ---
  nomad-vcn:
    type: oci:Core/vcn:Vcn
    properties:
      compartmentId: ${nomad-compartment.id}
      cidrBlocks: [{{ .Config.vcnCidr | quote }}]
      displayName: "nomad-vcn"
      dnsLabel: "nomadvcn"

  nomad-igw:
    type: oci:Core/internetGateway:InternetGateway
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      enabled: true
      displayName: "nomad-igw"

  nomad-natgw:
    type: oci:Core/natGateway:NatGateway
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: "nomad-natgw"
      blockTraffic: false

  public-security-list:
    type: oci:Core/securityList:SecurityList
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: "Public Security List"
      ingressSecurityRules:
        - protocol: "6"
          source: "0.0.0.0/0"
          sourceType: CIDR_BLOCK
          tcpOptions:
            max: 80
            min: 80
        - protocol: "6"
          source: "0.0.0.0/0"
          sourceType: CIDR_BLOCK
          tcpOptions:
            max: 443
            min: 443
        - protocol: "all"
          source: {{ .Config.vcnCidr | quote }}
          sourceType: CIDR_BLOCK
      egressSecurityRules:
        - protocol: "all"
          destination: "0.0.0.0/0"
          destinationType: CIDR_BLOCK

  private-security-list:
    type: oci:Core/securityList:SecurityList
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: "Private Security List"
      ingressSecurityRules:
        - protocol: "all"
          source: {{ .Config.vcnCidr | quote }}
          sourceType: CIDR_BLOCK
      egressSecurityRules:
        - protocol: "all"
          destination: "0.0.0.0/0"
          destinationType: CIDR_BLOCK

  nomad-public-rt:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: "nomad-public-rt"
      routeRules:
        - networkEntityId: ${nomad-igw.id}
          destination: "0.0.0.0/0"
          destinationType: CIDR_BLOCK

  nomad-private-rt:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: "nomad-private-rt"
      routeRules:
        - networkEntityId: ${nomad-natgw.id}
          destination: "0.0.0.0/0"
          destinationType: CIDR_BLOCK

  public-subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      cidrBlock: {{ .Config.publicSubnetCidr | quote }}
      displayName: "public-subnet"
      dnsLabel: "nomadvcnpub"
      prohibitPublicIpOnVnic: false
      routeTableId: ${nomad-public-rt.id}
      securityListIds: ["${public-security-list.id}"]
      dhcpOptionsId: ${nomad-vcn.defaultDhcpOptionsId}

  private-subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      cidrBlock: {{ .Config.privateSubnetCidr | quote }}
      displayName: "private-subnet"
      dnsLabel: "nomadvcnpriv"
      prohibitPublicIpOnVnic: true
      routeTableId: ${nomad-private-rt.id}
      securityListIds: ["${private-security-list.id}"]
      dhcpOptionsId: ${nomad-vcn.defaultDhcpOptionsId}

  ingress-nsg:
    type: oci:Core/networkSecurityGroup:NetworkSecurityGroup
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: "ingress-nsg"

  ingress-nsg-rule-80:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${ingress-nsg.id}
      direction: INGRESS
      protocol: "6"
      source: "0.0.0.0/0"
      sourceType: CIDR_BLOCK
      tcpOptions:
        destinationPortRange:
          min: 80
          max: 80
      description: "Allow HTTP"

  ingress-nsg-rule-443:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${ingress-nsg.id}
      direction: INGRESS
      protocol: "6"
      source: "0.0.0.0/0"
      sourceType: CIDR_BLOCK
      tcpOptions:
        destinationPortRange:
          min: 443
          max: 443
      description: "Allow HTTPS"

# --- section: compute ---
{{- range $i := until (atoi $.Config.nodeCount) }}
  nomad-instance-{{ $i }}:
    type: oci:Core/instance:Instance
    properties:
      compartmentId: ${nomad-compartment.id}
      availabilityDomain: ${availabilityDomains[0].name}
      displayName: {{ printf "nomad-node-%d" $i | quote }}
      shape: {{ $.Config.shape }}
      shapeConfig:
        ocpus: {{ $.Config.ocpusPerNode }}
        memoryInGbs: {{ $.Config.memoryGbPerNode }}
      sourceDetails:
        sourceType: image
        sourceId: {{ $.Config.imageId }}
        bootVolumeSizeInGbs: {{ $.Config.bootVolSizeGb | quote }}
      createVnicDetails:
        subnetId: ${private-subnet.id}
        assignPublicIp: false
        nsgIds: ["${ingress-nsg.id}"]
      metadata:
        ssh_authorized_keys: {{ $.Config.sshPublicKey }}
        user_data: {{ cloudInit $i $.Config }}
{{- end }}

# --- section: loadbalancer ---
  ingress-nlb:
    type: oci:NetworkLoadBalancer/networkLoadBalancer:NetworkLoadBalancer
    properties:
      compartmentId: ${nomad-compartment.id}
      subnetId: ${public-subnet.id}
      displayName: "ingress-nlb"
      isPrivate: false
      networkSecurityGroupIds: ["${ingress-nsg.id}"]

  ingress-nlb-bs-80:
    type: oci:NetworkLoadBalancer/backendSet:BackendSet
    properties:
      networkLoadBalancerId: ${ingress-nlb.id}
      name: "bs-80"
      policy: FIVE_TUPLE
      isPreserveSource: false
      healthChecker:
        protocol: TCP
        port: 80
    options:
      dependsOn:
        - ${ingress-nlb}

  ingress-nlb-listener-80:
    type: oci:NetworkLoadBalancer/listener:Listener
    properties:
      networkLoadBalancerId: ${ingress-nlb.id}
      name: "listener-80"
      defaultBackendSetName: "bs-80"
      protocol: TCP
      port: 80
    options:
      dependsOn:
        - ${ingress-nlb-bs-80}

{{- range $i := until (atoi $.Config.nodeCount) }}
  ingress-nlb-backend-80-{{ $i }}:
    type: oci:NetworkLoadBalancer/backend:Backend
    properties:
      networkLoadBalancerId: ${ingress-nlb.id}
      backendSetName: "bs-80"
      targetId: ${nomad-instance-{{ $i }}.id}
      port: 80
    options:
      dependsOn:
{{- if eq $i 0 }}
        - ${ingress-nlb-listener-80}
{{- else }}
        - ${ingress-nlb-backend-80-{{ sub $i 1 }}}
{{- end }}
{{- end }}

  ingress-nlb-bs-443:
    type: oci:NetworkLoadBalancer/backendSet:BackendSet
    properties:
      networkLoadBalancerId: ${ingress-nlb.id}
      name: "bs-443"
      policy: FIVE_TUPLE
      isPreserveSource: false
      healthChecker:
        protocol: TCP
        port: 443
    options:
      dependsOn:
        - ${ingress-nlb-backend-80-{{ sub (atoi $.Config.nodeCount) 1 }}}

  ingress-nlb-listener-443:
    type: oci:NetworkLoadBalancer/listener:Listener
    properties:
      networkLoadBalancerId: ${ingress-nlb.id}
      name: "listener-443"
      defaultBackendSetName: "bs-443"
      protocol: TCP
      port: 443
    options:
      dependsOn:
        - ${ingress-nlb-bs-443}

{{- range $i := until (atoi $.Config.nodeCount) }}
  ingress-nlb-backend-443-{{ $i }}:
    type: oci:NetworkLoadBalancer/backend:Backend
    properties:
      networkLoadBalancerId: ${ingress-nlb.id}
      backendSetName: "bs-443"
      targetId: ${nomad-instance-{{ $i }}.id}
      port: 443
    options:
      dependsOn:
{{- if eq $i 0 }}
        - ${ingress-nlb-listener-443}
{{- else }}
        - ${ingress-nlb-backend-443-{{ sub $i 1 }}}
{{- end }}
{{- end }}

outputs:
  nlbIps: ${ingress-nlb.ipAddresses}
  privateSubnetId: ${private-subnet.id}
  nlbPublicIp: ${ingress-nlb.ipAddresses[0].ipAddress}
