name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./internal/... -count=1 -race

      - name: Create frontend embed placeholder
        run: mkdir -p cmd/server/frontend/dist && echo "placeholder" > cmd/server/frontend/dist/index.html

      - name: Build agent binaries (required for server embed)
        run: |
          mkdir -p cmd/server/dist
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o cmd/server/dist/agent_linux_arm64 ./cmd/agent
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o cmd/server/dist/agent_linux_amd64 ./cmd/agent

      - name: Build server binary
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/server

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npx vitest run

      - name: Svelte check (warnings)
        run: npx svelte-check --threshold warning

      - name: Build frontend
        run: npm run build
