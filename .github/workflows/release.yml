name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish (e.g. v0.1.1)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run Go tests
        run: go test ./internal/... -count=1 -race

      - name: Run frontend tests
        working-directory: frontend
        run: npm ci && npx vitest run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build agent binaries
        run: |
          mkdir -p cmd/server/dist
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o cmd/server/dist/agent_linux_arm64 ./cmd/agent
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o cmd/server/dist/agent_linux_amd64 ./cmd/agent

      - name: Build server binary (linux/amd64)
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/pulumi-ui_linux_amd64 ./cmd/server

      - name: Build server binary (linux/arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/pulumi-ui_linux_arm64 ./cmd/server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            cmd/server/dist/agent_linux_arm64
            cmd/server/dist/agent_linux_amd64
            dist/pulumi-ui_linux_amd64
            dist/pulumi-ui_linux_arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/trustos/pulumi-ui:${{ github.event.inputs.tag || github.ref_name }}
