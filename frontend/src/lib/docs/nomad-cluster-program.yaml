# nomad-cluster — Go-templated Pulumi YAML
#
# This is the nomad_cluster.go built-in program expressed as a Go-templated
# Pulumi YAML so it can be imported and managed through the Programs UI.
#
# KNOWN LIMITATIONS vs the built-in Go program:
#
#   1. cloud-init: The cloudInit() template function leaves @@COMPARTMENT_OCID@@
#      and @@SUBNET_OCID@@ empty because those values are Pulumi runtime outputs
#      not available at template-render time. Consul/Nomad auto-join based on
#      compartment or subnet filtering will NOT work. You will need to configure
#      Consul retry_join via a different mechanism (e.g. cloud-auto-join with tags,
#      a static seed IP list, or a Consul server address injected manually).
#
#   2. sshPublicKey is a config field here. The built-in program reads it from the
#      OCI_USER_SSH_PUBLIC_KEY env var (set from the linked account / SSH key).
#      In a YAML program, env vars are not accessible, so the SSH public key must
#      be pasted as a config value.
#
#   3. Instances use oci:core:Instance directly instead of InstanceConfiguration +
#      InstancePool. The resource sizing (OCPUs, memory) is equivalent.
#
# Go-template directives (double-brace) are resolved before Pulumi runs.
# Pulumi references (${ }) are resolved by Pulumi at apply time.

name: nomad-cluster-yaml
runtime: yaml
description: "Nomad + Consul cluster on OCI Always Free A1 instances (YAML program)"

meta:
  groups:
    - key: iam
      label: "IAM & Permissions"
      fields: [skipDynamicGroup, adminGroupName, identityDomain]
    - key: infrastructure
      label: "Infrastructure"
      fields: [nodeCount, compartmentName, compartmentDescription, vcnCidr, publicSubnetCidr, privateSubnetCidr, sshSourceCidr, shape, imageId, sshPublicKey]
    - key: compute
      label: "Compute & Storage"
      fields: [bootVolSizeGb]
    - key: software
      label: "Software Versions"
      fields: [nomadVersion, consulVersion]
  fields:
    shape:
      ui_type: oci-shape
    imageId:
      ui_type: oci-image

config:
  # ── IAM & Permissions ────────────────────────────────────────────────────────
  skipDynamicGroup:
    type: String
    default: "false"
  adminGroupName:
    type: String
    default: ""
  identityDomain:
    type: String
    default: ""

  # ── Infrastructure ───────────────────────────────────────────────────────────
  nodeCount:
    type: Integer
    default: 3
  compartmentName:
    type: String
    default: nomad-compartment
  compartmentDescription:
    type: String
    default: "Compartment for Nomad cluster"
  vcnCidr:
    type: String
    default: "10.0.0.0/16"
  publicSubnetCidr:
    type: String
    default: "10.0.1.0/24"
  privateSubnetCidr:
    type: String
    default: "10.0.2.0/24"
  sshSourceCidr:
    type: String
    default: "0.0.0.0/0"
  shape:
    type: String
    default: VM.Standard.A1.Flex
  imageId:
    type: String
  sshPublicKey:
    type: String

  # ── Compute & Storage ────────────────────────────────────────────────────────
  bootVolSizeGb:
    type: Integer
    default: 50

  # ── Software Versions ────────────────────────────────────────────────────────
  nomadVersion:
    type: String
    default: "1.10.3"
  consulVersion:
    type: String
    default: "1.21.3"

variables:
  availabilityDomain:
    fn::invoke:
      function: oci:identity:getAvailabilityDomains
      arguments:
        compartmentId: ${oci:tenancyOcid}
      return: availabilityDomains[0].name

resources:

  # ── Compartment ─────────────────────────────────────────────────────────────

  nomad-compartment:
    type: oci:identity:Compartment
    properties:
      compartmentId: ${oci:tenancyOcid}
      name: {{ .Config.compartmentName }}
      description: {{ .Config.compartmentDescription | quote }}
      enableDelete: false

  # ── IAM ─────────────────────────────────────────────────────────────────────
  # Entire block is omitted when skipDynamicGroup = "true"

  {{- if ne .Config.skipDynamicGroup "true" }}

  {{- if .Config.adminGroupName }}
  nomad-iam-prereq-policy:
    type: oci:identity:Policy
    properties:
      compartmentId: ${oci:tenancyOcid}
      name: nomad-iam-prereq
      description: "Grants admin group permission to manage dynamic groups and policies"
      statements:
        - {{ groupRef .Config.adminGroupName .Config.identityDomain "manage dynamic-groups in tenancy" | quote }}
        - {{ groupRef .Config.adminGroupName .Config.identityDomain "manage policies in tenancy" | quote }}
  {{- end }}

  nomad-cluster-dg:
    type: oci:identity:DynamicGroup
    {{- if .Config.adminGroupName }}
    options:
      dependsOn:
        - ${nomad-iam-prereq-policy}
    {{- end }}
    properties:
      compartmentId: ${oci:tenancyOcid}
      name: nomad-cluster-dg
      description: "Dynamic group for Nomad cluster instances"
      matchingRule: "ALL {instance.compartment.id = '${nomad-compartment.id}'}"

  nomad-cluster-policy:
    type: oci:identity:Policy
    options:
      dependsOn:
        - ${nomad-cluster-dg}
    properties:
      compartmentId: ${oci:tenancyOcid}
      name: nomad-cluster-policy
      description: "Allow Nomad cluster nodes to manage cluster resources"
      statements:
        - "Allow dynamic-group ${nomad-cluster-dg.name} to inspect instances in compartment id ${nomad-compartment.id}"
        - "Allow dynamic-group ${nomad-cluster-dg.name} to inspect vnics in compartment id ${nomad-compartment.id}"
        - "Allow dynamic-group ${nomad-cluster-dg.name} to inspect compartments in tenancy"
        - "Allow dynamic-group ${nomad-cluster-dg.name} to inspect tenancies in tenancy"
        - "Allow dynamic-group ${nomad-cluster-dg.name} to read instance-family in compartment id ${nomad-compartment.id}"
        - "Allow dynamic-group ${nomad-cluster-dg.name} to read compute-management-family in compartment id ${nomad-compartment.id}"
        - "Allow dynamic-group ${nomad-cluster-dg.name} to read load-balancers in compartment id ${nomad-compartment.id}"
        - "Allow dynamic-group ${nomad-cluster-dg.name} to inspect private-ips in compartment id ${nomad-compartment.id}"
        - "Allow dynamic-group ${nomad-cluster-dg.name} to manage buckets in compartment id ${nomad-compartment.id}"
        - "Allow dynamic-group ${nomad-cluster-dg.name} to manage objects in compartment id ${nomad-compartment.id}"

  {{- end }}

  # ── Network ──────────────────────────────────────────────────────────────────

  nomad-vcn:
    type: oci:core:Vcn
    properties:
      compartmentId: ${nomad-compartment.id}
      cidrBlock: {{ .Config.vcnCidr | quote }}
      displayName: nomad-vcn
      dnsLabel: nomadvcn

  nomad-igw:
    type: oci:core:InternetGateway
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      enabled: true
      displayName: nomad-igw

  nomad-natgw:
    type: oci:core:NatGateway
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: nomad-natgw
      blockTraffic: false

  public-security-list:
    type: oci:core:SecurityList
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: "Public Security List"
      ingressSecurityRules:
        - protocol: "6"
          source: "0.0.0.0/0"
          sourceType: CIDR_BLOCK
          tcpOptions: { max: 80, min: 80 }
        - protocol: "6"
          source: "0.0.0.0/0"
          sourceType: CIDR_BLOCK
          tcpOptions: { max: 443, min: 443 }
        - protocol: "6"
          source: {{ .Config.sshSourceCidr | quote }}
          sourceType: CIDR_BLOCK
          tcpOptions: { max: 22, min: 22 }
        - protocol: "all"
          source: {{ .Config.vcnCidr | quote }}
          sourceType: CIDR_BLOCK
      egressSecurityRules:
        - protocol: "all"
          destination: "0.0.0.0/0"
          destinationType: CIDR_BLOCK

  private-security-list:
    type: oci:core:SecurityList
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: "Private Security List"
      ingressSecurityRules:
        - protocol: "all"
          source: {{ .Config.vcnCidr | quote }}
          sourceType: CIDR_BLOCK
      egressSecurityRules:
        - protocol: "all"
          destination: "0.0.0.0/0"
          destinationType: CIDR_BLOCK

  nomad-public-rt:
    type: oci:core:RouteTable
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: nomad-public-rt
      routeRules:
        - networkEntityId: ${nomad-igw.id}
          destination: "0.0.0.0/0"
          destinationType: CIDR_BLOCK

  nomad-private-rt:
    type: oci:core:RouteTable
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: nomad-private-rt
      routeRules:
        - networkEntityId: ${nomad-natgw.id}
          destination: "0.0.0.0/0"
          destinationType: CIDR_BLOCK

  public-subnet:
    type: oci:core:Subnet
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      cidrBlock: {{ .Config.publicSubnetCidr | quote }}
      displayName: public-subnet
      dnsLabel: nomadvcnpub
      prohibitPublicIpOnVnic: false
      routeTableId: ${nomad-public-rt.id}
      securityListIds:
        - ${public-security-list.id}
      dhcpOptionsId: ${nomad-vcn.defaultDhcpOptionsId}

  private-subnet:
    type: oci:core:Subnet
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      cidrBlock: {{ .Config.privateSubnetCidr | quote }}
      displayName: private-subnet
      dnsLabel: nomadvcnpriv
      prohibitPublicIpOnVnic: true
      routeTableId: ${nomad-private-rt.id}
      securityListIds:
        - ${private-security-list.id}
      dhcpOptionsId: ${nomad-vcn.defaultDhcpOptionsId}

  # ── NSGs ─────────────────────────────────────────────────────────────────────

  ssh-nsg:
    type: oci:core:NetworkSecurityGroup
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: ssh-nsg

  ssh-nsg-rule:
    type: oci:core:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${ssh-nsg.id}
      direction: INGRESS
      protocol: "6"
      source: {{ .Config.sshSourceCidr | quote }}
      sourceType: CIDR_BLOCK
      tcpOptions:
        destinationPortRange: { min: 22, max: 22 }
      description: "Allow SSH"

  nomad-nsg:
    type: oci:core:NetworkSecurityGroup
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: nomad-nsg

  {{- range $port := list 4646 4647 4648 }}
  nomad-nsg-rule-{{ $port }}:
    type: oci:core:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nomad-nsg.id}
      direction: INGRESS
      protocol: "6"
      source: {{ $.Config.publicSubnetCidr | quote }}
      sourceType: CIDR_BLOCK
      tcpOptions:
        destinationPortRange: { min: {{ $port }}, max: {{ $port }} }
      description: {{ printf "Allow Nomad port %d from public subnet" $port | quote }}
  {{- end }}

  traefik-nsg:
    type: oci:core:NetworkSecurityGroup
    properties:
      compartmentId: ${nomad-compartment.id}
      vcnId: ${nomad-vcn.id}
      displayName: traefik-nsg

  {{- range $port := list 80 443 }}
  traefik-nsg-rule-{{ $port }}:
    type: oci:core:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${traefik-nsg.id}
      direction: INGRESS
      protocol: "6"
      source: {{ $.Config.publicSubnetCidr | quote }}
      sourceType: CIDR_BLOCK
      tcpOptions:
        destinationPortRange: { min: {{ $port }}, max: {{ $port }} }
      description: {{ printf "Allow Traefik port %d from public subnet" $port | quote }}
  {{- end }}

  # ── Instances ────────────────────────────────────────────────────────────────
  # OCPUs and memory follow the Always Free allocation strategy:
  #   nodeCount=1 → 1×(4 OCPU / 24 GB)
  #   nodeCount=2 → 2×(2 OCPU / 12 GB)
  #   nodeCount=3 → 2×(1 OCPU / 8 GB) + 1×(2 OCPU / 8 GB)
  #   nodeCount=4 → 4×(1 OCPU / 6 GB)
  #
  # NOTE: user_data (cloud-init) is rendered without COMPARTMENT_OCID /
  # SUBNET_OCID — see limitations at the top of this file.

  {{- range $i := until (atoi $.Config.nodeCount) }}
  nomad-instance-{{ $i }}:
    type: oci:core:Instance
    properties:
      compartmentId: ${nomad-compartment.id}
      availabilityDomain: ${availabilityDomain}
      displayName: {{ printf "nomad-node-%d" $i | quote }}
      shape: {{ $.Config.shape | quote }}
      shapeConfig:
        ocpus: {{ instanceOcpus $i (atoi $.Config.nodeCount) }}
        memoryInGbs: {{ instanceMemoryGb $i (atoi $.Config.nodeCount) }}
      sourceDetails:
        sourceType: image
        imageId: {{ $.Config.imageId | quote }}
        bootVolumeSizeInGbs: {{ $.Config.bootVolSizeGb | quote }}
      createVnicDetails:
        subnetId: ${private-subnet.id}
        assignPublicIp: false
        nsgIds:
          - ${ssh-nsg.id}
          - ${nomad-nsg.id}
          - ${traefik-nsg.id}
      metadata:
        ssh_authorized_keys: {{ $.Config.sshPublicKey | quote }}
        user_data: {{ cloudInit $i $.Config }}
  {{- end }}

  # ── Network Load Balancer ────────────────────────────────────────────────────
  # Public NLB in the public subnet, fronting Traefik (80/443) and the Nomad
  # UI/API (4646). One BackendSet + Listener per port, all nodes as backends.

  traefik-nlb:
    type: oci:networkloadbalancer:NetworkLoadBalancer
    properties:
      compartmentId: ${nomad-compartment.id}
      subnetId: ${public-subnet.id}
      displayName: traefik-nlb
      isPrivate: false
      networkSecurityGroupIds:
        - ${traefik-nsg.id}

  {{- range $port := list 80 443 4646 }}
  traefik-nlb-bs-{{ $port }}:
    type: oci:networkloadbalancer:BackendSet
    options:
      dependsOn:
        - ${traefik-nlb}
    properties:
      networkLoadBalancerId: ${traefik-nlb.id}
      name: {{ printf "bs-%d" $port | quote }}
      policy: FIVE_TUPLE
      isPreserveSource: false
      healthChecker:
        protocol: TCP
        port: {{ $port }}

  traefik-nlb-listener-{{ $port }}:
    type: oci:networkloadbalancer:Listener
    options:
      dependsOn:
        - ${traefik-nlb-bs-{{ $port }}}
    properties:
      networkLoadBalancerId: ${traefik-nlb.id}
      name: {{ printf "listener-%d" $port | quote }}
      defaultBackendSetName: ${traefik-nlb-bs-{{ $port }}.name}
      protocol: TCP
      port: {{ $port }}

  {{- range $i := until (atoi $.Config.nodeCount) }}
  traefik-nlb-backend-{{ $port }}-{{ $i }}:
    type: oci:networkloadbalancer:Backend
    options:
      dependsOn:
        - ${traefik-nlb-bs-{{ $port }}}
    properties:
      networkLoadBalancerId: ${traefik-nlb.id}
      backendSetName: ${traefik-nlb-bs-{{ $port }}.name}
      targetId: ${nomad-instance-{{ $i }}.id}
      port: {{ $port }}
  {{- end }}
  {{- end }}

outputs:
  traefikNlbIps: ${traefik-nlb.ipAddresses}
  privateSubnetId: ${private-subnet.id}
