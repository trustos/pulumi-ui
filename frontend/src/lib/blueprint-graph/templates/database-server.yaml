name: database-server
runtime: yaml
description: "Compute instance in a private subnet with block volume storage — host PostgreSQL, MySQL, MongoDB, or any database engine"

meta:
  displayName: Private Database Server
  agentAccess: true

config:
  compartmentId:
    type: string
  imageId:
    type: string
    default: ""
  sshPublicKey:
    type: string
    default: ""
  shape:
    type: string
    default: "VM.Standard.A1.Flex"
  ocpus:
    type: string
    default: "2"
  memoryInGbs:
    type: string
    default: "16"
  volumeSizeGbs:
    type: string
    default: "100"
    description: "Block volume size in GB for data storage"
  availabilityDomain:
    type: string
    default: ""
    description: "Availability domain that offers the selected shape"

resources:
  # --- section: networking ---
  vcn:
    type: oci:Core/vcn:Vcn
    properties:
      compartmentId: {{ .Config.compartmentId }}
      cidrBlocks: ["10.0.0.0/16"]
      displayName: "db-vcn"
      dnsLabel: "dbvcn"
  nat-gw:
    type: oci:Core/natGateway:NatGateway
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "nat-gw"
    options:
      dependsOn:
        - ${vcn}
  route-table:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "db-rt"
      routeRules: [{ destination: "0.0.0.0/0", networkEntityId: "${nat-gw.id}" }]
    options:
      dependsOn:
        - ${nat-gw}
  nsg:
    type: oci:Core/networkSecurityGroup:NetworkSecurityGroup
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "db-nsg"
    options:
      dependsOn:
        - ${vcn}
  nsg-db:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nsg.id}
      direction: "INGRESS"
      protocol: "6"
      source: "10.0.0.0/16"
      sourceType: "CIDR_BLOCK"
      tcpOptions: { destinationPortRange: { min: 5432, max: 5432 } }
    options:
      dependsOn:
        - ${nsg}
  subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      cidrBlock: "10.0.1.0/24"
      displayName: "db-subnet"
      dnsLabel: "db"
      routeTableId: ${route-table.id}
      prohibitPublicIpOnVnic: "true"
      dhcpOptionsId: ${vcn.defaultDhcpOptionsId}
    options:
      dependsOn:
        - ${route-table}
  # --- section: compute ---
  db-server:
    type: oci:Core/instance:Instance
    properties:
      compartmentId: {{ .Config.compartmentId }}
      availabilityDomain: "{{ .Config.availabilityDomain }}"
      shape: "{{ .Config.shape }}"
      displayName: "db-server"
      sourceDetails: { sourceType: "image", sourceId: "{{ .Config.imageId }}" }
      createVnicDetails: { subnetId: "${subnet.id}", assignPublicIp: false, nsgIds: ["${nsg.id}"] }
      metadata: { ssh_authorized_keys: "{{ .Config.sshPublicKey }}" }
      shapeConfig: {{ computeConfig "oci" "" .Config.shape .Config.ocpus .Config.memoryInGbs }}
    options:
      dependsOn:
        - ${subnet}
        - ${nsg-db}
  data-volume:
    type: oci:Core/volume:Volume
    properties:
      compartmentId: {{ .Config.compartmentId }}
      availabilityDomain: "{{ .Config.availabilityDomain }}"
      displayName: "data-volume"
      sizeInGbs: {{ .Config.volumeSizeGbs }}
  volume-attach:
    type: oci:Core/volumeAttachment:VolumeAttachment
    properties:
      instanceId: ${db-server.id}
      volumeId: ${data-volume.id}
      attachmentType: "paravirtualized"
      displayName: "data-attach"
    options:
      dependsOn:
        - ${db-server}
        - ${data-volume}

outputs:
  dbPrivateIp: ${db-server.privateIp}