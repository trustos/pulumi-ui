name: ha-pair
runtime: yaml
description: "Two instances behind a Network Load Balancer with TCP health checks — active/active or active/passive HA"

meta:
  displayName: High-Availability Pair with NLB
  agentAccess: true

config:
  compartmentId:
    type: string
  imageId:
    type: string
  sshPublicKey:
    type: string
  shape:
    type: string
    default: "VM.Standard.A1.Flex"
  ocpus:
    type: string
    default: "2"
  memoryInGbs:
    type: string
    default: "12"
  appPort:
    type: string
    default: "443"
    description: "TCP port for the NLB listener"
  deployAds:
    type: string
    default: ""
    description: "Availability domains to spread the pair across (comma-separated)"

resources:
  # --- section: networking ---
  vcn:
    type: oci:Core/vcn:Vcn
    properties:
      compartmentId: {{ .Config.compartmentId }}
      cidrBlocks: ["10.0.0.0/16"]
      displayName: "ha-vcn"
      dnsLabel: "ha"
  igw:
    type: oci:Core/internetGateway:InternetGateway
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "ha-igw"
      enabled: "true"
    options:
      dependsOn:
        - ${vcn}
  route-table:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "ha-rt"
      routeRules: [{ destination: "0.0.0.0/0", networkEntityId: "${igw.id}" }]
    options:
      dependsOn:
        - ${igw}
  subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      cidrBlock: "10.0.1.0/24"
      displayName: "ha-subnet"
      dnsLabel: "hasub"
      routeTableId: ${route-table.id}
      prohibitPublicIpOnVnic: "false"
      dhcpOptionsId: ${vcn.defaultDhcpOptionsId}
    options:
      dependsOn:
        - ${route-table}
  nlb:
    type: oci:NetworkLoadBalancer/networkLoadBalancer:NetworkLoadBalancer
    properties:
      compartmentId: {{ .Config.compartmentId }}
      displayName: "ha-nlb"
      subnetId: ${subnet.id}
      isPrivate: "false"
    options:
      dependsOn:
        - ${subnet}
  backend-set:
    type: oci:NetworkLoadBalancer/backendSet:BackendSet
    properties:
      networkLoadBalancerId: ${nlb.id}
      name: "app-backends"
      policy: "FIVE_TUPLE"
      healthChecker: { protocol: "TCP", port: {{ .Config.appPort }} }
    options:
      dependsOn:
        - ${nlb}
  listener:
    type: oci:NetworkLoadBalancer/listener:Listener
    properties:
      networkLoadBalancerId: ${nlb.id}
      name: "app-listener"
      defaultBackendSetName: ${backend-set.name}
      protocol: "TCP"
      port: {{ .Config.appPort }}
    options:
      dependsOn:
        - ${backend-set}
  # --- section: compute ---
  node-a:
    type: oci:Core/instance:Instance
    properties:
      compartmentId: {{ .Config.compartmentId }}
      availabilityDomain: "{{ index (splitList "," .Config.deployAds) (mod 0 (len (splitList "," .Config.deployAds))) }}"
      shape: "{{ .Config.shape }}"
      displayName: "node-a"
      sourceDetails: { sourceType: "image", sourceId: "{{ .Config.imageId }}" }
      createVnicDetails: { subnetId: "${subnet.id}", assignPublicIp: true }
      metadata: { ssh_authorized_keys: "{{ .Config.sshPublicKey }}" }
      shapeConfig: {{ computeConfig "oci" "" .Config.shape .Config.ocpus .Config.memoryInGbs }}
    options:
      dependsOn:
        - ${subnet}
  node-b:
    type: oci:Core/instance:Instance
    properties:
      compartmentId: {{ .Config.compartmentId }}
      availabilityDomain: "{{ index (splitList "," .Config.deployAds) (mod 1 (len (splitList "," .Config.deployAds))) }}"
      shape: "{{ .Config.shape }}"
      displayName: "node-b"
      sourceDetails: { sourceType: "image", sourceId: "{{ .Config.imageId }}" }
      createVnicDetails: { subnetId: "${subnet.id}", assignPublicIp: true }
      metadata: { ssh_authorized_keys: "{{ .Config.sshPublicKey }}" }
      shapeConfig: {{ computeConfig "oci" "" .Config.shape .Config.ocpus .Config.memoryInGbs }}
    options:
      dependsOn:
        - ${subnet}
  backend-a:
    type: oci:NetworkLoadBalancer/backend:Backend
    properties:
      networkLoadBalancerId: ${nlb.id}
      backendSetName: ${backend-set.name}
      targetId: ${node-a.id}
      port: {{ .Config.appPort }}
    options:
      dependsOn:
        - ${listener}
        - ${node-a}
  backend-b:
    type: oci:NetworkLoadBalancer/backend:Backend
    properties:
      networkLoadBalancerId: ${nlb.id}
      backendSetName: ${backend-set.name}
      targetId: ${node-b.id}
      port: {{ .Config.appPort }}
    options:
      dependsOn:
        - ${backend-a}
        - ${node-b}

outputs:
  nlbPublicIp: ${nlb.ipAddresses[0].ipAddress}
