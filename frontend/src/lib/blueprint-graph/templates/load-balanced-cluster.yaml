name: load-balanced-cluster
runtime: yaml
description: "N instances behind a Network Load Balancer with health checks — deploy web apps, APIs, or microservices (inspired by Kubernetes Deployment + Service)"

meta:
  displayName: Load-Balanced Application Cluster
  agentAccess: true

config:
  compartmentId:
    type: string
  nodeCount:
    type: integer
    default: "3"
    description: "Number of backend instances"
  imageId:
    type: string
    default: ""
  sshPublicKey:
    type: string
    default: ""
  shape:
    type: string
    default: "VM.Standard.A1.Flex"
  ocpus:
    type: string
    default: "2"
  memoryInGbs:
    type: string
    default: "12"
  appPort:
    type: string
    default: "8080"
    description: "TCP port the application listens on"
  adCount:
    type: integer
    default: "1"
    description: "Number of availability domains to round-robin across"

variables:
  availabilityDomains:
    fn::invoke:
      function: oci:Identity/getAvailabilityDomains:getAvailabilityDomains
      arguments:
        compartmentId: ${oci:tenancyOcid}
      return: availabilityDomains

resources:
  # --- section: networking ---
  vcn:
    type: oci:Core/vcn:Vcn
    properties:
      compartmentId: {{ .Config.compartmentId }}
      cidrBlocks: ["10.0.0.0/16"]
      displayName: "app-vcn"
      dnsLabel: "appvcn"
  igw:
    type: oci:Core/internetGateway:InternetGateway
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "app-igw"
      enabled: "true"
    options:
      dependsOn:
        - ${vcn}
  nat-gw:
    type: oci:Core/natGateway:NatGateway
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "nat-gw"
    options:
      dependsOn:
        - ${vcn}
  public-rt:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "public-rt"
      routeRules:
        - destination: "0.0.0.0/0"
          networkEntityId: ${igw.id}
    options:
      dependsOn:
        - ${igw}
  private-rt:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "private-rt"
      routeRules:
        - destination: "0.0.0.0/0"
          networkEntityId: ${nat-gw.id}
    options:
      dependsOn:
        - ${nat-gw}
  public-subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      cidrBlock: "10.0.0.0/24"
      displayName: "public-subnet"
      dnsLabel: "pub"
      routeTableId: ${public-rt.id}
      prohibitPublicIpOnVnic: "false"
      dhcpOptionsId: ${vcn.defaultDhcpOptionsId}
    options:
      dependsOn:
        - ${public-rt}
  private-subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      cidrBlock: "10.0.1.0/24"
      displayName: "private-subnet"
      dnsLabel: "priv"
      routeTableId: ${private-rt.id}
      prohibitPublicIpOnVnic: "true"
      dhcpOptionsId: ${vcn.defaultDhcpOptionsId}
    options:
      dependsOn:
        - ${private-rt}
  nlb:
    type: oci:NetworkLoadBalancer/networkLoadBalancer:NetworkLoadBalancer
    properties:
      compartmentId: {{ .Config.compartmentId }}
      displayName: "app-nlb"
      subnetId: ${public-subnet.id}
      isPrivate: "false"
    options:
      dependsOn:
        - ${public-subnet}
  # --- section: compute ---
{{- range $i := until (atoi $.Config.nodeCount) }}
  node-{{ $i }}:
    type: oci:Core/instance:Instance
    properties:
      compartmentId: {{ $.Config.compartmentId }}
      availabilityDomain: ${availabilityDomains[{{ mod $i (atoi $.Config.adCount) }}].name}
      shape: "{{ $.Config.shape }}"
      displayName: "node-{{ $i }}"
      sourceDetails: { sourceType: "image", sourceId: "{{ $.Config.imageId }}" }
      createVnicDetails: { subnetId: "${private-subnet.id}", assignPublicIp: false }
      metadata: { ssh_authorized_keys: "{{ $.Config.sshPublicKey }}" }
      shapeConfig: {{ computeConfig "oci" "" $.Config.shape $.Config.ocpus $.Config.memoryInGbs }}
    options:
      dependsOn:
        - ${private-subnet}
{{- end }}

outputs:
  nlbPublicIp: ${nlb.ipAddresses[0].ipAddress}
