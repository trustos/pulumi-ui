name: web-server
runtime: yaml
description: "Single instance with HTTP/HTTPS security rules — ideal for hosting websites or APIs (inspired by WordPress / static site hosts)"

meta:
  displayName: Public Web Server
  agentAccess: true

config:
  compartmentId:
    type: string
  imageId:
    type: string
    default: ""
    description: "OCI image OCID"
  sshPublicKey:
    type: string
    default: ""
  shape:
    type: string
    default: "VM.Standard.A1.Flex"
  ocpus:
    type: string
    default: "1"
  memoryInGbs:
    type: string
    default: "6"

variables:
  availabilityDomains:
    fn::invoke:
      function: oci:Identity/getAvailabilityDomains:getAvailabilityDomains
      arguments:
        compartmentId: ${oci:tenancyOcid}
      return: availabilityDomains

resources:
  # --- section: networking ---
  vcn:
    type: oci:Core/vcn:Vcn
    properties:
      compartmentId: {{ .Config.compartmentId }}
      cidrBlocks: ["10.0.0.0/16"]
      displayName: "web-vcn"
      dnsLabel: "webvcn"
  igw:
    type: oci:Core/internetGateway:InternetGateway
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "igw"
      enabled: "true"
    options:
      dependsOn:
        - ${vcn}
  route-table:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "web-rt"
      routeRules: [{ destination: "0.0.0.0/0", networkEntityId: "${igw.id}" }]
    options:
      dependsOn:
        - ${igw}
  security-list:
    type: oci:Core/securityList:SecurityList
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "web-security-list"
      ingressSecurityRules:
        - protocol: "all"
          source: "0.0.0.0/0"
          sourceType: CIDR_BLOCK
      egressSecurityRules:
        - protocol: "all"
          destination: "0.0.0.0/0"
          destinationType: CIDR_BLOCK
  nsg:
    type: oci:Core/networkSecurityGroup:NetworkSecurityGroup
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "web-nsg"
    options:
      dependsOn:
        - ${vcn}
  nsg-http:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nsg.id}
      direction: "INGRESS"
      protocol: "6"
      source: "0.0.0.0/0"
      sourceType: "CIDR_BLOCK"
      tcpOptions: { destinationPortRange: { min: 80, max: 80 } }
    options:
      dependsOn:
        - ${nsg}
  nsg-https:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nsg.id}
      direction: "INGRESS"
      protocol: "6"
      source: "0.0.0.0/0"
      sourceType: "CIDR_BLOCK"
      tcpOptions: { destinationPortRange: { min: 443, max: 443 } }
    options:
      dependsOn:
        - ${nsg}
  nsg-ssh:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nsg.id}
      direction: "INGRESS"
      protocol: "6"
      source: "0.0.0.0/0"
      sourceType: "CIDR_BLOCK"
      tcpOptions: { destinationPortRange: { min: 22, max: 22 } }
    options:
      dependsOn:
        - ${nsg}
  subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      cidrBlock: "10.0.1.0/24"
      displayName: "web-subnet"
      dnsLabel: "web"
      routeTableId: ${route-table.id}
      prohibitPublicIpOnVnic: "false"
      securityListIds:
        - ${security-list.id}
      dhcpOptionsId: ${vcn.defaultDhcpOptionsId}
    options:
      dependsOn:
        - ${route-table}
  # --- section: compute ---
  web-server:
    type: oci:Core/instance:Instance
    properties:
      compartmentId: {{ .Config.compartmentId }}
      availabilityDomain: ${availabilityDomains[0].name}
      shape: "{{ .Config.shape }}"
      displayName: "web-server"
      sourceDetails: { sourceType: "image", sourceId: "{{ .Config.imageId }}" }
      createVnicDetails: { subnetId: "${subnet.id}", assignPublicIp: true, nsgIds: ["${nsg.id}"] }
      metadata: { ssh_authorized_keys: "{{ .Config.sshPublicKey }}" }
      shapeConfig: { ocpus: {{ .Config.ocpus }}, memoryInGbs: {{ .Config.memoryInGbs }} }
    options:
      dependsOn:
        - ${subnet}
        - ${nsg-http}
        - ${nsg-https}
        - ${nsg-ssh}

outputs:
  publicIp: ${web-server.publicIp}