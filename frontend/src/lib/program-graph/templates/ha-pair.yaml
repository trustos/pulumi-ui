name: ha-pair
runtime: yaml
description: "Two private instances behind a public NLB with NAT gateway — active/active or active/passive HA"

meta:
  displayName: High-Availability Pair with NLB
  agentAccess: true

config:
  compartmentId:
    type: string
  imageId:
    type: string
  sshPublicKey:
    type: string
  shape:
    type: string
    default: "VM.Standard.A1.Flex"
  ocpus:
    type: string
    default: "2"
  memoryInGbs:
    type: string
    default: "12"
  appPort:
    type: string
    default: "443"
    description: "TCP port for the NLB listener"

variables:
  availabilityDomains:
    fn::invoke:
      function: oci:Identity/getAvailabilityDomains:getAvailabilityDomains
      arguments:
        compartmentId: ${oci:tenancyOcid}
      return: availabilityDomains

resources:
  # --- section: networking ---
  vcn:
    type: oci:Core/vcn:Vcn
    properties:
      compartmentId: {{ .Config.compartmentId }}
      cidrBlocks: ["10.0.0.0/16"]
      displayName: "ha-vcn"
      dnsLabel: "ha"
  igw:
    type: oci:Core/internetGateway:InternetGateway
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "ha-igw"
      enabled: "true"
    options:
      dependsOn:
        - ${vcn}
  natgateway:
    type: oci:Core/natGateway:NatGateway
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "ha-natgw"
    options:
      dependsOn:
        - ${vcn}
  public-route-table:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "ha-public-rt"
      routeRules: [{ destination: "0.0.0.0/0", networkEntityId: "${igw.id}" }]
    options:
      dependsOn:
        - ${igw}
  private-route-table:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "ha-private-rt"
      routeRules: [{ destination: "0.0.0.0/0", networkEntityId: "${natgateway.id}" }]
    options:
      dependsOn:
        - ${natgateway}
  public-subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      cidrBlock: "10.0.1.0/24"
      displayName: "ha-public-subnet"
      dnsLabel: "hapub"
      routeTableId: ${public-route-table.id}
      prohibitPublicIpOnVnic: "false"
    options:
      dependsOn:
        - ${public-route-table}
  private-subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      cidrBlock: "10.0.2.0/24"
      displayName: "ha-private-subnet"
      dnsLabel: "hapriv"
      routeTableId: ${private-route-table.id}
      prohibitPublicIpOnVnic: "false"
    options:
      dependsOn:
        - ${private-route-table}
  nlb:
    type: oci:NetworkLoadBalancer/networkLoadBalancer:NetworkLoadBalancer
    properties:
      compartmentId: {{ .Config.compartmentId }}
      displayName: "ha-nlb"
      subnetId: ${public-subnet.id}
      isPrivate: "false"
    options:
      dependsOn:
        - ${public-subnet}
  backend-set:
    type: oci:NetworkLoadBalancer/backendSet:BackendSet
    properties:
      networkLoadBalancerId: ${nlb.id}
      name: "app-backends"
      policy: "FIVE_TUPLE"
      healthChecker: { protocol: "TCP", port: {{ .Config.appPort }} }
    options:
      dependsOn:
        - ${nlb}
  listener:
    type: oci:NetworkLoadBalancer/listener:Listener
    properties:
      networkLoadBalancerId: ${nlb.id}
      name: "app-listener"
      defaultBackendSetName: ${backend-set.name}
      protocol: "TCP"
      port: {{ .Config.appPort }}
    options:
      dependsOn:
        - ${backend-set}
  # --- section: compute ---
  node-a:
    type: oci:Core/instance:Instance
    properties:
      compartmentId: {{ .Config.compartmentId }}
      availabilityDomain: ${availabilityDomains[0].name}
      shape: "{{ .Config.shape }}"
      displayName: "node-a"
      sourceDetails: { sourceType: "image", sourceId: "{{ .Config.imageId }}" }
      createVnicDetails: { subnetId: "${private-subnet.id}", assignPublicIp: true }
      metadata: { ssh_authorized_keys: "{{ .Config.sshPublicKey }}" }
      shapeConfig: { ocpus: {{ .Config.ocpus }}, memoryInGbs: {{ .Config.memoryInGbs }} }
    options:
      dependsOn:
        - ${private-subnet}
  node-b:
    type: oci:Core/instance:Instance
    properties:
      compartmentId: {{ .Config.compartmentId }}
      availabilityDomain: ${availabilityDomains[1].name}
      shape: "{{ .Config.shape }}"
      displayName: "node-b"
      sourceDetails: { sourceType: "image", sourceId: "{{ .Config.imageId }}" }
      createVnicDetails: { subnetId: "${private-subnet.id}", assignPublicIp: true }
      metadata: { ssh_authorized_keys: "{{ .Config.sshPublicKey }}" }
      shapeConfig: { ocpus: {{ .Config.ocpus }}, memoryInGbs: {{ .Config.memoryInGbs }} }
    options:
      dependsOn:
        - ${private-subnet}
  backend-a:
    type: oci:NetworkLoadBalancer/backend:Backend
    properties:
      networkLoadBalancerId: ${nlb.id}
      backendSetName: ${backend-set.name}
      targetId: ${node-a.id}
      port: {{ .Config.appPort }}
    options:
      dependsOn:
        - ${listener}
        - ${node-a}
  backend-b:
    type: oci:NetworkLoadBalancer/backend:Backend
    properties:
      networkLoadBalancerId: ${nlb.id}
      backendSetName: ${backend-set.name}
      targetId: ${node-b.id}
      port: {{ .Config.appPort }}
    options:
      dependsOn:
        - ${backend-a}
        - ${node-b}

outputs:
  nlbPublicIp: ${nlb.ipAddresses[0].ipAddress}
