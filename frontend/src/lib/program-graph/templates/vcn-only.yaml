name: my-vcn
runtime: yaml
description: "VCN in an existing compartment — the minimal networking foundation for any OCI deployment"

meta:
  displayName: Virtual Cloud Network

config:
  compartmentId:
    type: string
  vcnCidr:
    type: string
    default: "10.0.0.0/16"
    description: "CIDR block for the VCN"

resources:
  # --- section: networking ---
  my-vcn:
    type: oci:Core/vcn:Vcn
    properties:
      compartmentId: {{ .Config.compartmentId }}
      cidrBlocks: ["{{ .Config.vcnCidr }}"]
      displayName: "my-vcn"
      dnsLabel: "myvcn"

outputs:
  compartmentId: {{ .Config.compartmentId }}
  vcnId: ${my-vcn.id}